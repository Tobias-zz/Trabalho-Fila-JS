<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fila em JavaScript</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
    
    <script>
      $(document).ready(function(){
        $('#txtCpf').mask('000.000.000-00');
      });
    </script>
    
    <script src="utils/utils.js"></script>
    <script src="model/Fila.js"></script>
    <script src="model/Atendimento.js"></script>
    <script src="controller/filaController.js"></script>
    </head>
  <body>
    <div class="container">
      <div class="jumbotron bg-success text-light text-center py-3">
        <h1 class="display-4"><i class="fas fa-headset"></i> Sistema de Controle de Atendimento</h1>
      </div>

      <div id="mensagem-remocao" class="alert alert-success mt-3" style="display: none;"></div>

      <h2 class="mt-3">Fila</h2>
      <p>Adicione pessoas na fila:</p>

      <div class="row g-2 mb-3">
        <div class="col-md-5">
          <label for="txtNome" class="form-label">Nome:</label>
          <input type="text" class="form-control" id="txtNome" placeholder="Digite o nome do cliente" />
        </div>
        <div class="col-md-4">
          <label for="txtCpf" class="form-label">CPF:</label>
          <input type="text" class="form-control" id="txtCpf" placeholder="Digite o CPF do cliente" />
        </div>
      </div>

      <div class="mb-3">
        <button class="btn btn-primary" onclick="adicionarElemento()">
          <i class="fas fa-plus"></i> Adicionar à fila
        </button>
        <button class="btn btn-success" onclick="removerElemento()">
          <i class="fas fa-check"></i> Atender
        </button>
        <button class="btn btn-warning" onclick="buscarElemento()">
          <i class="fas fa-search"></i> Buscar
        </button>
      </div>

      <h2 id="lblPessoasFila">Dados da Fila</h2>
      <ul id="listFila" class="list-group"></ul>

      <footer class="footer bg-success text-light text-center mt-5 py-3">
        <div class="container text-center">
          <span class="text-light">Desenvolvido por IFSULDEMINAS - Campus Machado <i class="fas fa-heart"></i></span>
        </div>
      </footer>
    </div>
  </body>
</html>
